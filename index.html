<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Save on Mobile in Canada</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

/* Main card */
.container {
    width: 100%;
    max-width: 500px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
    text-align: center;

    /* glowing full border effect */
    border: 2px solid transparent;
    background-clip: padding-box;
    position: relative;
}

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: 2px;
    border-radius: 20px;
    background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ffcc);
    -webkit-mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

/* Text */
h1 {
    font-size: 24px;
    margin-bottom: 10px;
}

p {
    font-size: 15px;
    line-height: 1.5;
}

/* Link box */
.link-box {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 10px;
    margin: 15px 0;
    word-break: break-all;
    font-size: 13px;
}

/* Buttons */
button {
    padding: 12px 15px;
    border: none;
    border-radius: 10px;
    margin: 8px;
    cursor: pointer;
    font-weight: bold;
    width: 45%;
}

.copy-btn {
    background: #00ffcc;
    color: #000;
}

.open-btn {
    background: #ff00cc;
    color: white;
}

/* Footer */
.footer {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 15px;
}

/* mobile fix */
@media (max-width: 480px) {
    button {
        width: 100%;
        display: block;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🇨🇦 Save on Mobile Bills in Canada</h1>

    <p>
        Join <b>Public Mobile</b> and get affordable 5G plans on the Telus network.  
        No contracts, no hidden fees — simple and cheap mobile service in Canada.
    </p>

    <div class="link-box" id="refLink">
        https://inviteyourfriends.github.io/publicmobile/
    </div>

    <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
    <button class="open-btn" onclick="openLink()">🚀 Open Offer</button>

    <div class="footer">
        Share this page with friends in Canada
    </div>
</div>

<script>
function copyLink() {
    const text = document.getElementById("refLink").innerText.trim();

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
        alert("Link copied!");
    } else {
        // fallback for older browsers
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("Link copied!");
    }
}

function openLink() {
    window.open("https://inviteyourfriends.github.io/publicmobile/", "_blank");
}
</script>

</body>
</html>
